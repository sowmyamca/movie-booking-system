<!DOCTYPE html>
<html>

<head>
<title>Movie Booking</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<h3>Welcome {{ user }}</h3>
<a href="/logout">Logout</a>

<h1>🎬 Movie Ticket Booking</h1>

<!-- Movie Poster -->
<img src="https://upload.wikimedia.org/wikipedia/en/6/6e/Avatar_%282009_film%29_poster.jpg" width="200">

<br><br>

<!-- Cinema Screen -->
<div style="background:gray;color:white;padding:10px;width:300px;margin:auto;border-radius:5px;">
SCREEN
</div>

<br>

<form action="/book" method="POST">

<input type="text" name="name" placeholder="Your Name" required><br><br>

<select name="movie">
<option>Avatar</option>
<option>Avengers</option>
<option>Spider Man</option>
</select>

<br><br>

<label>Select Seat</label>

<br><br>

<button class="seat" type="button" onclick="selectSeat('A1')">A1</button>
<button class="seat" type="button" onclick="selectSeat('A2')">A2</button>
<button class="seat" type="button" onclick="selectSeat('A3')">A3</button>

<br><br>

<button class="seat" type="button" onclick="selectSeat('B1')">B1</button>
<button class="seat" type="button" onclick="selectSeat('B2')">B2</button>
<button class="seat" type="button" onclick="selectSeat('B3')">B3</button>

<br><br>

<input type="text" name="seat" id="seat" placeholder="Selected Seat" readonly required>

<br><br>

<input type="number" name="tickets" placeholder="Number of Tickets" required>

<br><br>

<button type="submit">Book Ticket</button>

</form>

<br>

<a href="/bookings">View My Bookings</a>

<script>

function selectSeat(seat){
document.getElementById("seat").value = seat;
}

</script>

</body>
</html>
